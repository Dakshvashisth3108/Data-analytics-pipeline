# ───────────────────────────────────────────────────────────────
# HCM Analytics — application config
# Values can be overridden by environment variables of the same
# uppercased name (e.g. KAFKA__BOOTSTRAP_SERVERS).
# ───────────────────────────────────────────────────────────────

env: local

kafka:
  bootstrap_servers: localhost:9092
  schema_registry_url: http://localhost:8081
  client_id: hcm-analytics
  acks: all
  compression_type: snappy
  linger_ms: 20
  retries: 5

topics:
  employees:    hcm.employees
  employee_csv: hcm_employee_data
  attendance:   hcm.attendance
  performance:  hcm.performance
  recruitment:  hcm.recruitment

# Local lakehouse layout — swap for s3a:// / abfss:// in prod
lake:
  root: ./data
  bronze: ./data/bronze
  silver: ./data/silver
  gold:   ./data/gold
  checkpoints: ./data/checkpoints

spark:
  master: "local[*]"
  app_name: hcm-analytics
  shuffle_partitions: 8
  serializer: org.apache.spark.serializer.KryoSerializer
  # Spark 4.x is built against Scala 2.13 (2.12 was dropped). The
  # Hadoop 3.4 libraries it bundles fix the Java 24+ Subject.getSubject
  # incompat, which is what makes Java 26.0.1 viable.
  packages:
    - org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.0
    - io.delta:delta-spark_2.13:4.0.0

logging:
  level: INFO
  json: true
  file: ./logs/hcm.log

producer:
  default_rate_per_sec: 25
  seed: 42
  csv:
    default_path: data/raw/hcm_employees.csv
    delay_seconds: 0.05      # ~20 msg/s — feels real-time without flooding
    jitter: 0.5              # +/- 50% of delay for organic variability
    loop: true               # restart from row 0 when file ends
    progress_every: 1000
    flush_timeout_seconds: 30

streaming:
  trigger_interval: "30 seconds"
  max_offsets_per_trigger: 50000
  starting_offsets: latest

silver:
  employees:
    dq:
      max_invalid_salary_pct:    0.10   # warn if > 10% salaries unparseable
      max_invalid_date_pct:      0.10   # warn if > 10% joining dates invalid
      max_unknown_department_pct: 0.05  # warn if > 5% depts not canonicalised
