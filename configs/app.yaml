# ───────────────────────────────────────────────────────────────
# HCM Analytics — application config
# Values can be overridden by environment variables of the same
# uppercased name (e.g. KAFKA__BOOTSTRAP_SERVERS).
# ───────────────────────────────────────────────────────────────

env: local

kafka:
  bootstrap_servers: localhost:9092
  schema_registry_url: http://localhost:8081
  client_id: hcm-analytics
  acks: all
  compression_type: snappy
  linger_ms: 20
  retries: 5

topics:
  employees:    hcm.employees
  employee_csv: hcm_employee_data
  attendance:   hcm.attendance
  performance:  hcm.performance
  recruitment:  hcm.recruitment

# Local lakehouse layout — swap for s3a:// / abfss:// in prod
lake:
  root: ./data
  bronze: ./data/bronze
  silver: ./data/silver
  gold:   ./data/gold
  checkpoints: ./data/checkpoints

spark:
  master: "local[*]"
  app_name: hcm-analytics
  shuffle_partitions: 8
  serializer: org.apache.spark.serializer.KryoSerializer
  # Connector jars MUST match the Spark runtime's major.minor (binary
  # API changes between minors). pyspark 4.1.1 -> connector 4.1.1.
  # Delta is omitted -- the project writes plain Parquet only; if you
  # later switch the Silver/Gold sinks to Delta, add:
  #   - io.delta:delta-spark_2.13:<version-matched-to-spark>
  packages:
    - org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.1

logging:
  level: INFO
  json: true
  file: ./logs/hcm.log

producer:
  default_rate_per_sec: 25
  seed: 42
  csv:
    default_path: data/raw/hcm_employees.csv
    delay_seconds: 0.05      # ~20 msg/s — feels real-time without flooding
    jitter: 0.5              # +/- 50% of delay for organic variability
    loop: true               # restart from row 0 when file ends
    progress_every: 1000
    flush_timeout_seconds: 30

streaming:
  trigger_interval: "30 seconds"
  max_offsets_per_trigger: 50000
  starting_offsets: latest

silver:
  employees:
    dq:
      max_invalid_salary_pct:    0.10   # warn if > 10% salaries unparseable
      max_invalid_date_pct:      0.10   # warn if > 10% joining dates invalid
      max_unknown_department_pct: 0.05  # warn if > 5% depts not canonicalised

# Natural-language to SQL — Ollama (Gemma 2B by default) + DuckDB on Gold parquet.
# "Gemini 2B" is informally used for Google's open-weights Gemma 2B model;
# the actual Ollama tag is gemma2:2b. Override via env or here.
nl2sql:
  ollama:
    base_url: http://localhost:11434
    model: gemma2:2b
    timeout_seconds: 120
    temperature: 0.1
    num_predict: 512                # max tokens
  duckdb:
    gold_root: data/gold            # mount every <domain>/<metric>/ as a view
    default_row_limit: 500          # injected when the LLM forgets a LIMIT
    max_result_rows: 10000          # hard cap on returned rows
  safety:
    allowed_statement_kinds: [Select, With]
    blocked_keywords:
      - ATTACH
      - COPY
      - INSTALL
      - LOAD
      - PRAGMA
      - SET
      - EXPORT
      - IMPORT
      - "READ_TEXT"
      - "READ_BLOB"
    max_sql_length_chars: 4000

# Hybrid conversational router — intent -> SQL / RAG / both.
router:
  conversation:
    history_turns: 6
  classifier:
    enable_rule_tier: true
    enable_llm_tier:  true
    # If the rule-based scorer reaches this confidence, skip the LLM call.
    rule_confidence_threshold: 0.75
  rag:
    top_k: 5
    min_similarity: 0.0
  synthesizer:
    max_output_chars: 1200
    temperature: 0.2

# Embeddings / RAG
# Reads Gold parquet -> produces narrative business insights -> embeds them ->
# writes to ChromaDB at ``vectors_dir``. No Spark required (pure pandas).
embeddings:
  model: sentence-transformers/all-MiniLM-L6-v2   # 384-dim, ~80MB, fast
  vectors_dir: data/vectors/chroma                # persistent ChromaDB store
  collection_name: hcm_insights
  batch_size: 32
  currency_label: "INR"                            # used in chunk text
  top_n_for_lists: 5
